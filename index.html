<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #0a1a3d;
    --gold: #c9a86a;
    --gold-soft: #e6d5ab;
    --bg: #f5f1e6;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e8dfc9;
    --red: #c8322b;
  }
  html, body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    padding-bottom: 40px;
  }
  /* Progress bar */
  .progress-wrap {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(10,26,61,0.08);
    z-index: 50;
  }
  .progress-bar {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 400ms ease;
  }
  .screen {
    padding: 28px 22px 40px;
    opacity: 0;
    animation: fadeIn 300ms ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 14px;
  }
  h1, h2 {
    font-weight: 700;
    color: var(--navy);
    line-height: 1.2;
    text-wrap: pretty;
  }
  h1 { font-size: 26px; margin-bottom: 10px; }
  h2 { font-size: 22px; margin-bottom: 10px; }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 26px;
  }
  /* Option card */
  .options { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
  .opt {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    font-size: 15px;
    font-weight: 500;
    color: var(--navy);
    text-align: left;
    cursor: pointer;
    transition: all 200ms ease;
    box-shadow: 0 2px 8px rgba(10,26,61,0.04);
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .opt:hover { border-color: var(--gold-soft); }
  .opt.selected {
    border-color: var(--gold);
    transform: scale(1.02);
    box-shadow: 0 6px 18px rgba(201,168,106,0.25);
    background: #fffdf7;
  }
  .opt .check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms ease;
  }
  .opt.selected .check {
    background: var(--gold);
    border-color: var(--gold);
  }
  .opt.selected .check::after {
    content: "✓";
    color: white;
    font-size: 13px;
    font-weight: 700;
  }
  .opt.check-box .check { border-radius: 6px; }
  /* Big gender buttons */
  .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 22px; padding: 0; }
  .gender-card {
    position: relative;
    background: #fff;
    border: 2px solid transparent;
    border-radius: 16px;
    height: 380px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    padding: 0;
    font-family: inherit;
    display: block;
  }
  .gender-card:hover { transform: translateY(-2px); }
  .gender-card.selected {
    border-color: var(--gold);
    transform: scale(1.02);
    box-shadow: 0 10px 30px rgba(201,168,106,0.35);
  }
  .gender-card img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .gender-card .caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: rgba(10,26,61,0.85);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #fff;
  }
  .gender-card .caption .lbl {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .gender-card .caption .arrow {
    font-size: 22px;
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
  }
  .gender-card.selected .caption .arrow::before { content: "\2713"; }
  .gender-card:not(.selected) .caption .arrow::before { content: "\2192"; }
  @media (min-width: 600px) {
    .gender-card { height: 420px; }
  }
  .gender-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 28px 14px;
    font-family: inherit;
    font-weight: 600;
    font-size: 16px;
    color: var(--navy);
    cursor: pointer;
    transition: all 200ms ease;
    box-shadow: 0 2px 8px rgba(10,26,61,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .gender-btn:hover { border-color: var(--gold-soft); }
  .gender-btn.selected {
    border-color: var(--gold);
    transform: scale(1.02);
  }
  .gender-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--navy);
    font-size: 28px;
  }
  /* Buttons */
  .btn-primary {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 24px;
    letter-spacing: 0.02em;
    transition: all 200ms ease;
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary:not(:disabled):hover {
    background: #11285a;
  }
  /* Scale 1-5 */
  .scale {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 24px;
  }
  .scale-btn {
    aspect-ratio: 1;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: inherit;
    font-weight: 700;
    font-size: 28px;
    color: var(--navy);
    cursor: pointer;
    transition: all 200ms ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scale-btn:hover { border-color: var(--gold-soft); }
  .scale-btn.selected {
    border-color: var(--gold);
    background: var(--gold);
    color: #fff;
    transform: scale(1.06);
  }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    padding: 0 4px;
  }
  /* Interstitial */
  .interstitial {
    text-align: center;
    padding-top: 40px;
  }
  .interstitial .emblem {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  /* Profile card */
  .profile-card {
    background: var(--navy);
    color: #fff;
    border-radius: 20px;
    padding: 28px 22px;
    margin-top: 12px;
    box-shadow: 0 16px 40px rgba(10,26,61,0.18);
  }
  .profile-card .label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  .profile-card h2 {
    color: #fff;
    font-size: 26px;
    margin: 8px 0 18px;
  }
  .levels {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 22px;
  }
  .level-chunk {
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.12);
  }
  .level-chunk.active { background: var(--gold); }
  .level-names {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
    margin-top: -14px;
    margin-bottom: 22px;
  }
  .level-names span.active { color: var(--gold); font-weight: 600; }
  .profile-row {
    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .profile-row:first-of-type { border-top: none; padding-top: 0; }
  .profile-row .k {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .profile-row .v {
    font-size: 15px;
    color: #fff;
    font-weight: 500;
  }
  /* Loading */
  .loading-bars { margin: 28px 0 20px; display: flex; flex-direction: column; gap: 18px; }
  .loading-item .lbl { display: flex; justify-content: space-between; font-size: 13px; color: var(--navy); font-weight: 500; margin-bottom: 6px; }
  .loading-item .lbl .pct { color: var(--gold); font-weight: 700; font-variant-numeric: tabular-nums; }
  .loading-track {
    height: 8px;
    border-radius: 4px;
    background: rgba(10,26,61,0.08);
    overflow: hidden;
  }
  .loading-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold), #d9bd84);
    border-radius: 4px;
    transition: width 2s ease;
  }
  .commit-modal {
    background: #fff;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 22px;
    margin: 20px 0;
    text-align: center;
    box-shadow: 0 12px 32px rgba(10,26,61,0.12);
  }
  .commit-modal h3 {
    color: var(--navy);
    font-size: 18px;
    margin-bottom: 16px;
    font-weight: 700;
  }
  .commit-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .commit-btns button {
    padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    border: 2px solid var(--border);
    background: #fff;
    color: var(--navy);
    transition: all 200ms ease;
  }
  .commit-btns .yes {
    background: var(--navy);
    color: #fff;
    border-color: var(--gold);
  }
  .commit-btns .yes:hover { background: #11285a; }
  .commit-btns .no:hover { border-color: var(--muted); }
  .testimonial-rotator {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    margin-top: 18px;
    border: 1px solid var(--border);
    min-height: 92px;
  }
  .testimonial-rotator .quote { font-size: 14px; color: var(--navy); font-style: italic; line-height: 1.5; }
  .testimonial-rotator .author { font-size: 12px; color: var(--muted); margin-top: 8px; font-weight: 600; }
  .stars { color: var(--gold); letter-spacing: 2px; font-size: 13px; margin-bottom: 6px; }
  /* Offer screen */
  .timer-bar {
    background: var(--red);
    color: #fff;
    padding: 12px 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 40;
  }
  .timer-bar strong { font-variant-numeric: tabular-nums; font-size: 15px; letter-spacing: 0.02em; }
  .offer-hero {
    padding: 28px 22px 10px;
    text-align: center;
  }
  .offer-hero .eyebrow { margin-bottom: 8px; }
  .offer-hero h1 { font-size: 26px; line-height: 1.2; }
  .offer-hero .dek { color: var(--muted); font-size: 14px; margin-top: 12px; }
  .product-image-wrap { text-align: center; margin: 20px auto 10px; }
  .product-image {
    display: block;
    margin: 0 auto;
    width: 100%;
    max-width: 280px;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    transform: rotate(-2deg);
  }
  @media (min-width: 600px) {
    .product-image { max-width: 340px; }
  }
  .product-image-caption {
    color: var(--gold);
    font-style: italic;
    font-size: 12px;
    margin-top: 14px;
    letter-spacing: 0.02em;
  }
  .product-mock {
    margin: 20px auto;
    width: 85%;
    aspect-ratio: 3/4;
    background: var(--navy);
    border-radius: 18px;
    box-shadow: 0 20px 48px rgba(10,26,61,0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .product-mock .band {
    background: var(--gold);
    padding: 14px;
    text-align: center;
    color: var(--navy);
    font-weight: 700;
    letter-spacing: 0.2em;
    font-size: 14px;
  }
  .product-mock .body {
    flex: 1;
    padding: 24px;
    color: #fff;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .product-mock .year { font-size: 56px; font-weight: 800; color: var(--gold); letter-spacing: 0.05em; }
  .product-mock .title { font-size: 18px; font-weight: 600; margin: 6px 0; }
  .product-mock .cross {
    width: 40px;
    height: 60px;
    margin: 10px auto;
    position: relative;
  }
  .product-mock .cross::before,
  .product-mock .cross::after {
    content: "";
    position: absolute;
    background: var(--gold);
  }
  .product-mock .cross::before { width: 6px; height: 60px; left: 17px; }
  .product-mock .cross::after { width: 30px; height: 6px; top: 17px; left: 5px; }
  .product-mock .footer-text { font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.6); text-transform: uppercase; }
  .perso-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin: 20px 22px;
    box-shadow: 0 4px 14px rgba(10,26,61,0.05);
  }
  .perso-card h3 {
    color: var(--navy);
    font-size: 16px;
    margin-bottom: 14px;
    font-weight: 700;
  }
  .perso-row {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .perso-row:first-of-type { border-top: none; padding-top: 0; }
  .perso-row .pk { color: var(--muted); min-width: 90px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.08em; font-weight: 600; }
  .perso-row .pv { color: var(--navy); font-weight: 600; flex: 1; }
  .benefits {
    margin: 22px 22px;
    list-style: none;
  }
  .benefits li {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--navy);
    line-height: 1.5;
  }
  .benefits li:first-child { border-top: none; }
  .benefits .tick {
    color: var(--gold);
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
  }
  .anchor-block {
    background: var(--navy);
    border-radius: 18px;
    padding: 22px 18px;
    margin: 22px;
    color: #fff;
    box-shadow: 0 16px 40px rgba(10,26,61,0.18);
  }
  .anchor-title {
    color: var(--gold);
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .anchor-main {
    background: rgba(255,255,255,0.04);
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
    text-align: center;
  }
  .anchor-main-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 10px; line-height: 1.3; }
  .anchor-prices { display: flex; justify-content: center; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .a-was { color: #9aa3b5; text-decoration: line-through; font-size: 14px; font-weight: 500; }
  .a-arrow { color: var(--gold); font-weight: 700; }
  .a-now { color: var(--gold); font-size: 22px; font-weight: 800; letter-spacing: 0.01em; }
  .anchor-desc { color: rgba(255,255,255,0.65); font-size: 12px; font-style: italic; }
  .a-emoji { font-size: 18px; margin-right: 6px; }
  .anchor-bonus {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,106,0.3);
    border-radius: 12px;
    padding: 14px 14px;
    margin-bottom: 12px;
  }
  .ab-head { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; line-height: 1.35; }
  .ab-foot { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .ab-prices { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .ab-prices .a-now { font-size: 18px; }
  .a-free {
    background: #2d7a2d;
    color: #fff;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .anchor-total {
    background: var(--gold);
    color: var(--navy);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    margin-top: 16px;
    line-height: 1.4;
  }
  .anchor-total .at-was { text-decoration: line-through; opacity: 0.6; font-weight: 600; margin: 0 4px; }
  .anchor-total strong { font-size: 20px; font-weight: 800; }
  .price-card {
    background: #fff;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 24px 20px;
    margin: 22px;
    text-align: center;
  }
  .price-card .was {
    color: var(--muted);
    font-size: 14px;
    text-decoration: line-through;
    margin-bottom: 4px;
  }
  .price-card .now {
    color: var(--navy);
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .price-card .now small { font-size: 22px; font-weight: 600; color: var(--gold); }
  .price-card .save {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }
  .price-table {
    width: 100%;
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    font-size: 14px;
  }
  .price-table .row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    color: var(--navy);
  }
  .price-table .row.bonus { color: var(--gold); font-weight: 600; }
  .price-table .row.total {
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 6px;
    font-weight: 800;
    font-size: 16px;
  }
  .cta-big {
    display: block;
    background: var(--navy);
    color: #fff;
    border: 3px solid var(--gold);
    border-radius: 16px;
    padding: 22px 20px;
    margin: 10px 22px 20px;
    text-align: center;
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.03em;
    line-height: 1.3;
    box-shadow: 0 12px 32px rgba(10,26,61,0.25);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 12px 32px rgba(10,26,61,0.25); }
    50% { transform: scale(1.015); box-shadow: 0 16px 42px rgba(201,168,106,0.4); }

/* ============== ROUTER ============== */
const container = document.getElementById('screen-container');
const progressBar = document.getElementById('progressBar');
const progressWrap = document.getElementById('progressWrap');

function updateProgress() {
  if (state.screen >= 20) {
    progressWrap.style.display = 'none';
    return;
  }
  progressWrap.style.display = 'block';
  const pct = Math.round((state.screen / 19) * 100);
  progressBar.style.width = pct + '%';
}

function go(n) {
  state.screen = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function next() { go(state.screen + 1); }

function saveAndNext(key, value) {
  state.answers[key] = value;
  setTimeout(() => next(), 240);
}

/* ============== RENDER HELPERS ============== */
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderRadio(qKey, qData, idx) {
  const picked = state.answers[qKey];
  const optsHtml = qData.options.map((o, i) => `
    <button class="opt ${picked === i ? 'selected' : ''}" data-i="${i}">
      <span class="check"></span>
      <span>${esc(o)}</span>
    </button>
  `).join('');
  container.innerHTML = `
    <div class="screen">
      <div class="eyebrow">Pergunta ${idx} de 14</div>
      <h1>${esc(qData.title)}</h1>
      ${qData.subtitle ? `<p class="subtitle">${esc(qData.subtitle)}</p>` : ''}
      <div class="options">${optsHtml}</div>
    </div>
  `;
  container.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i, 10);
      container.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      saveAndNext(qKey, i);
    });
  });
}

function renderMulti(qKey, qData, idx) {
  const picked = state.answers[qKey] || [];
  const optsHtml = qData.options.map((o, i) => `
    <button class="opt check-box ${picked.includes(i) ? 'selected' : ''}" data-i="${i}">
      <span class="check"></span>
      <span>${esc(o)}</span>
    </button>
  `).join('');
  container.innerHTML = `
    <div class="screen">
      <div class="eyebrow">Pergunta ${idx} de 14</div>
      <h1>${esc(qData.title)}</h1>
      ${qData.subtitle ? `<p class="subtitle">${esc(qData.subtitle)}</p>` : ''}
      <div class="options">${optsHtml}</div>
      <button class="btn-primary" id="continueBtn" ${picked.length ? '' : 'disabled'}>Continuar →</button>
    </div>
  `;
  const continueBtn = document.getElementById('continueBtn');
  const updateBtn = () => {
    const sel = state.answers[qKey] || [];
    continueBtn.disabled = sel.length === 0;
  };
  container.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i, 10);
      let arr = state.answers[qKey] || [];
      if (arr.includes(i)) arr = arr.filter(x => x !== i);
      else arr = [...arr, i];
      state.answers[qKey] = arr;
      btn.classList.toggle('selected');
      updateBtn();
    });
  });
  continueBtn.addEventListener('click', () => {
    if (!continueBtn.disabled) next();
  });
}

function renderScale(qKey, qData, idx) {
  const picked = state.answers[qKey];
  const glyphs = ['①','②','③','④','⑤'];
  const btns = glyphs.map((g, i) => `
    <button class="scale-btn ${picked === i+1 ? 'selected' : ''}" data-v="${i+1}">${g}</button>
  `).join('');
  container.innerHTML = `

      <h1>${esc(qData.title)}</h1>

}

/* ============== PROFILE LOGIC ============== */
function computeProfile() {
  const q1 = state.answers.q1; // 0=todos, 1=algumas, 2=raramente, 3=quase nunca
  const q5 = state.answers.q5; // 1..5

  // Q1(opção4)→"Fiel em Busca"
  if (q1 === 3) return { name: "Fiel em Busca", level: 0 };
  // Q1(opção1)+Q5(⑤)→"Fiel Enraizado"
  if (q1 === 0 && q5 === 5) return { name: "Fiel Enraizado", level: 3 };
  // Q1(opções1-2)+Q5(③④)→"Fiel Aprofundado"
  if ((q1 === 0 || q1 === 1) && (q5 === 3 || q5 === 4)) return { name: "Fiel Aprofundado", level: 2 };
  // Q1(opções2-3)+Q5(①②)→"Fiel em Crescimento"
  if ((q1 === 1 || q1 === 2) && (q5 === 1 || q5 === 2)) return { name: "Fiel em Crescimento", level: 1 };
  // fallback sensible mapping
  if (q1 === 2) return { name: "Fiel em Crescimento", level: 1 };
  if (q1 === 0) return { name: "Fiel Aprofundado", level: 2 };
  return { name: "Fiel em Crescimento", level: 1 };
}

function getMainDesire() {
  // From Q9 (multi) - pick first selected
  const picks = state.answers.q9 || [];
  if (picks.length === 0) return "Paz interior";
  return Q.q9.options[picks[0]];
}

function getMainBarrier() {
  const idx = state.answers.q4;
  if (idx == null) return "Distracções e preocupações";
  return Q.q4.options[idx];
}

function getRecommendedPath(profile) {
  switch (profile.name) {
    case "Fiel em Busca":
      return "Começar com 5 minutos diários de oração simples.";
    case "Fiel em Crescimento":
      return "Rotina matinal com orações de Leão XIII.";
    case "Fiel Aprofundado":
      return "Oração estruturada em três momentos diários.";
    case "Fiel Enraizado":
      return "Aprofundar com meditação e oração contemplativa.";
    default:
      return "Rotina diária com orações curtas e constantes.";
  }
}

      </div>
      <button class="btn-primary" id="leadSubmit" disabled>Criar o meu calendário personalizado →</button>
      <p class="lead-legal">Os teus dados estão seguros. Não fazemos spam.</p>
    </div>
  `;
  const n = document.getElementById('leadName');
  const e = document.getElementById('leadEmail');
  const b = document.getElementById('leadSubmit');
  const emailOk = s => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s.trim());
  function check() {
    b.disabled = !(n.value.trim().length > 1 && emailOk(e.value));
  }
  n.addEventListener('input', check);
  e.addEventListener('input', check);
  check();
  b.addEventListener('click', () => {
    if (b.disabled) return;
    state.answers.name = n.value.trim();
    state.answers.email = e.value.trim();
    next();
  });
}

<!-- UTM capture + checkout link enrichment -->
<script>
(function() {
  // Captura UTMs da URL atual
  const utmKeys = ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','utm_id','src'];
  const params = new URLSearchParams(window.location.search);
  const stored = {};
  utmKeys.forEach(k => { if(params.get(k)) stored[k] = params.get(k); });
  if(Object.keys(stored).length) sessionStorage.setItem('quiz_utms', JSON.stringify(stored));

  // Aplica UTMs a todos os links de checkout ao clicar
  function appendUtms(url) {
    try {
      const saved = JSON.parse(sessionStorage.getItem('quiz_utms') || '{}');
      if(!Object.keys(saved).length) return url;
      const u = new URL(url, window.location.origin);
      Object.entries(saved).forEach(([k,v]) => u.searchParams.set(k,v));
      return u.toString();
    } catch(e) { return url; }
  }

  document.addEventListener('click', function(e) {
    const btn = e.target.closest('a[href], button[data-checkout]');
    if(btn && btn.href && (btn.href.includes('pay') || btn.href.includes('checkout') || btn.href.includes('hotmart') || btn.href.includes('kiwify') || btn.href.includes('editorasagrado'))) {
      e.preventDefault();
      window.location.href = appendUtms(btn.href);
    }
  });
})();
</script>
